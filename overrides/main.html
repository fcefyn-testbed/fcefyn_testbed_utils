{% extends "base.html" %}

{# Institutional logos: thin bar above the default Material footer (non-intrusive). #}
{% block footer %}
  <aside class="md-institutional-bar md-typeset" aria-label="Instituciones">
    <div class="md-grid md-institutional-bar__inner">
      <nav class="md-institutional-bar__logos">
        <a
          class="md-institutional-bar__link"
          href="https://fcefyn.unc.edu.ar/"
          target="_blank"
          rel="noopener noreferrer"
          title="Facultad de Ciencias Exactas, Físicas y Naturales - UNC"
        >
          <img
            src="{{ 'img/logos/fcefyn.png' | url }}"
            alt="FCEFyN — UNC"
            loading="lazy"
            decoding="async"
          />
        </a>
        <a
          class="md-institutional-bar__link md-institutional-bar__link--unc"
          href="https://www.unc.edu.ar/"
          target="_blank"
          rel="noopener noreferrer"
          title="Universidad Nacional de Córdoba"
        >
          <img
            src="{{ 'img/logos/unc.png' | url }}"
            alt="Universidad Nacional de Córdoba"
            loading="lazy"
            decoding="async"
          />
        </a>
      </nav>
    </div>
  </aside>
  {{ super() }}
{% endblock %}
