<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="100%">
  <!-- Base -->
  <circle cx="340" cy="340" r="310" fill="#0E2F28"/>
  <circle cx="340" cy="340" r="286" fill="#1A9E82"/>

  <!-- WiFi symbol (thicker arcs +25%) -->
  <g>
    <!-- outer -->
    <path d="M 160 178 A 180 180 0 0 0 520 178"
          fill="none" stroke="#0B0F14" stroke-width="26" stroke-linecap="round"/>
    <path d="M 160 178 A 180 180 0 0 0 520 178"
          fill="none" stroke="#2F3E4D" stroke-width="21" stroke-linecap="round"/>

    <!-- middle -->
    <path d="M 205 148 A 135 135 0 0 0 475 148"
          fill="none" stroke="#0B0F14" stroke-width="26" stroke-linecap="round"/>
    <path d="M 205 148 A 135 135 0 0 0 475 148"
          fill="none" stroke="#466176" stroke-width="21" stroke-linecap="round"/>

    <!-- inner -->
    <path d="M 250 118 A 90 90 0 0 0 430 118"
          fill="none" stroke="#0B0F14" stroke-width="26" stroke-linecap="round"/>
    <path d="M 250 118 A 90 90 0 0 0 430 118"
          fill="none" stroke="#6E8DA3" stroke-width="21" stroke-linecap="round"/>

    <!-- dot -->
    <circle cx="340" cy="84" r="19" fill="#0B0F14"/>
    <circle cx="340" cy="84" r="14" fill="#6E8DA3"/>
  </g>

  <!-- Router -->
  <g transform="translate(340 474) scale(1.22) translate(-340 -474)" opacity="0.98">
    <!-- antennas -->
    <line x1="255" y1="440" x2="228" y2="385"
          stroke="#0B0F14" stroke-width="11" stroke-linecap="round"/>
    <line x1="425" y1="440" x2="452" y2="385"
          stroke="#0B0F14" stroke-width="11" stroke-linecap="round"/>

    <!-- joints -->
    <circle cx="255" cy="440" r="5.5" fill="#0B0F14"/>
    <circle cx="425" cy="440" r="5.5" fill="#0B0F14"/>

    <!-- body -->
    <rect x="175" y="440" width="330" height="78" rx="16"
          fill="#2A3441" stroke="#0B0F14" stroke-width="11"/>

    <!-- top highlight -->
    <line x1="202" y1="460" x2="478" y2="460"
          stroke="#5B6B79" stroke-width="4.5" stroke-linecap="round" opacity="0.82"/>

    <!-- LEDs -->
    <circle cx="228" cy="480" r="7" fill="#E5533D"/>
    <circle cx="255" cy="480" r="7" fill="#D1A72C"/>
    <circle cx="282" cy="480" r="7" fill="#3FB950"/>

    <!-- ports -->
    <rect x="395" y="468" width="32" height="24" rx="4"
          fill="#1C252F" stroke="#5B6B79" stroke-width="2.2"/>
    <rect x="440" y="468" width="32" height="24" rx="4"
          fill="#1C252F" stroke="#5B6B79" stroke-width="2.2"/>

    <!-- slot -->
    <line x1="214" y1="505" x2="325" y2="505"
          stroke="#4A5A68" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>