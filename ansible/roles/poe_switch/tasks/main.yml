---
# Role: poe_switch
# Installs poe_switch_control.py, switch_daemon.py, and the
# labgrid-switch-abstraction package for PoE power control of DUTs
# via TP-Link managed switch.
# Required by PDUDaemon for fcefyn-poe PDU entries.

- name: Install netmiko for switch SSH (apt avoids PEP 668 externally-managed-environment)
  ansible.builtin.apt:
    name: python3-netmiko
    state: present
    update_cache: yes

- name: Install labgrid-switch-abstraction package
  ansible.builtin.pip:
    name: "git+https://github.com/fcefyn-testbed/labgrid-switch-abstraction.git"
    state: present
    extra_args: --break-system-packages

- name: Copy poe_switch_control.py to /usr/local/bin
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/switch/poe_switch_control.py"
    dest: /usr/local/bin/poe_switch_control.py
    mode: "0755"

- name: Copy switch_daemon.py to /usr/local/bin
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/switch/switch_daemon.py"
    dest: /usr/local/bin/switch_daemon.py
    mode: "0755"

- name: Install switch-ssh-daemon systemd unit
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../configs/templates/switch-ssh-daemon.service"
    dest: /etc/systemd/system/switch-ssh-daemon.service
    mode: "0644"

- name: Enable and start switch-ssh-daemon
  ansible.builtin.systemd:
    name: switch-ssh-daemon
    enabled: yes
    state: started
    daemon_reload: yes
