---
# Role: testbed_status
# Installs the testbed-status TUI dashboard for real-time lab monitoring.
# Requires: Python 3.8+.

- name: Ensure PyYAML is installed
  ansible.builtin.apt:
    name: python3-yaml
    state: present
    update_cache: yes

- name: Install textual (ignoring system-managed packages to avoid Pygments conflict)
  ansible.builtin.pip:
    name: textual
    state: present
    extra_args: --break-system-packages --ignore-installed

- name: Create /etc/testbed directory
  ansible.builtin.file:
    path: /etc/testbed
    state: directory
    mode: "0755"

- name: Deploy pool-config.yaml to /etc/testbed
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../configs/pool-config.yaml"
    dest: /etc/testbed/pool-config.yaml
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: "0664"

- name: Create testbed_status lib directory
  ansible.builtin.file:
    path: /usr/local/lib/testbed_status
    state: directory
    mode: "0755"

- name: Copy testbed_status package files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/testbed_status/{{ item }}"
    dest: "/usr/local/lib/testbed_status/{{ item }}"
    mode: "0644"
  loop:
    - __init__.py
    - __main__.py
    - app.py
    - collectors.py
    - widgets.py
    - config.py

- name: Install testbed-status wrapper script
  ansible.builtin.copy:
    dest: /usr/local/bin/testbed-status
    mode: "0755"
    content: |
      #!/usr/bin/env python3
      import os
      import sys
      os.environ.setdefault("TESTBED_POOL_CONFIG", "/etc/testbed/pool-config.yaml")
      sys.path.insert(0, "/usr/local/lib")
      from testbed_status.__main__ import main
      main()
