site_name: FCEFyN Testbed Utils
site_description: Documentación del banco de pruebas HIL para OpenWrt y LibreMesh
site_url: https://fcefyn-testbed.github.io/fcefyn_testbed_utils/
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: es
  logo: img/logos/fcefyn-testbed-org.png
  palette:
    - scheme: default
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/theme-colors.css
  - stylesheets/institutional-logos.css
  - stylesheets/demos.css
  - stylesheets/rack-gallery.css
  - stylesheets/catalog-hardware.css
  - stylesheets/content-images.css

extra_javascript:
  - javascripts/rack-gallery.js

# Header shortcuts (overrides/partials/header.html)
extra:
  grafana_url: https://fcefyn-testbed.duckdns.org/
  github_repo_url: https://github.com/fcefyn-testbed/fcefyn_testbed_utils

nav:
