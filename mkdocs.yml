site_name: FCEFyN Testbed Utils
site_description: HIL testbed documentation for OpenWrt and LibreMesh
site_url: https://fcefyn-testbed.github.io/fcefyn_testbed_utils/
docs_dir: docs

# README.md is a GitHub pointer; index.md is the site home (same URL would conflict).
exclude_docs: |
  README.md

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: img/logos/fcefyn-testbed-org.png
  palette:
    - scheme: default
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/theme-colors.css
  - stylesheets/institutional-logos.css
  - stylesheets/demos.css
  - stylesheets/rack-gallery.css
  - stylesheets/catalog-hardware.css
  - stylesheets/content-images.css

extra_javascript:
  - javascripts/rack-gallery.js

# Header shortcuts (overrides/partials/header.html)
extra:
  grafana_url: https://fcefyn-testbed.duckdns.org/
  github_repo_url: https://github.com/fcefyn-testbed/fcefyn_testbed_utils

nav:
  - Home: index.md
  - Demos: demos.md
  - Lab operations:
      - Operations manual: operar/SOM.md
      - Lab procedures: operar/lab-procedures.md
      - Rack cheatsheet: operar/rack-cheatsheets.md
      - SSH access to DUTs: operar/dut-ssh-access.md
      - Manual firmware build: operar/build-firmware-manual.md
      - Labgrid troubleshooting: operar/labgrid-troubleshooting.md
      - Adding a DUT: operar/adding-dut-guide.md
      - Wake-on-LAN: operar/wake-on-lan-setup.md
      - ZeroTier (remote access): operar/zerotier-remote-access.md
  - Component configuration:
      - Network and DUTs:
          - Host: configuracion/host-config.md
          - Switch: configuracion/switch-config.md
          - Gateway: configuracion/gateway.md
          - DUTs: configuracion/duts-config.md
      - Services and automation:
          - TFTP / dnsmasq: configuracion/tftp-server.md
          - Arduino relay: configuracion/arduino-relay.md
          - Ansible / Labgrid: configuracion/ansible-labgrid.md
          - CI Runner: configuracion/ci-runner.md
      - Hardware and rack reference:
          - Hardware catalog: configuracion/catalogo-hardware.md
          - "Physical rack (photos and 3D)": diseno/rack-diseno-3d.md
      - Metrics:
          - Public Grafana: configuracion/grafana-public-access.md
          - Observability: configuracion/observabilidad.md
  - Design:
      - Unified pool architecture: diseno/unified-pool.md
      - openwrt-tests onboarding: diseno/openwrt-tests-onboarding.md
      - CI use cases: diseno/ci-use-cases.md
      - Virtual mesh: diseno/virtual-mesh.md
      - "(historical) Hybrid lab": diseno/hybrid-lab-proposal.md
      - "(historical) Hybrid lab tracking": diseno/hybrid-lab-tracking.md
