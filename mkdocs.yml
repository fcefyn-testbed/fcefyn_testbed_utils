site_name: FCEFyN Testbed Utils
site_description: HIL testbed documentation for OpenWrt and LibreMesh
site_url: https://fcefyn-testbed.github.io/fcefyn_testbed_utils/
docs_dir: docs

plugins:
  - search
  - panzoom:
      full_screen: true
      always_show_hint: true

# README.md is a GitHub pointer; index.md is the site home (same URL would conflict).
exclude_docs: |
  README.md

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: img/logos/fcefyn-testbed-org.png
  palette:
    - scheme: default
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/theme-colors.css
  - stylesheets/nav-primary-sections.css
  - stylesheets/institutional-logos.css
  - stylesheets/demos.css
  - stylesheets/rack-gallery.css
  - stylesheets/catalog-hardware.css
  - stylesheets/content-images.css

extra_javascript:
  - javascripts/rack-gallery.js

# Header shortcuts (overrides/partials/header.html)
extra:
  grafana_url: https://fcefyn-testbed.duckdns.org/
  github_repo_url: https://github.com/fcefyn-testbed/fcefyn_testbed_utils

nav:
  - Home: index.md
  - Lab operations:
      - Operations manual: operar/system-operation-manual.md
      - Rack quick reference: operar/rack-cheatsheets.md
      - Routine operations: operar/lab-routine-operations.md
      - SSH access to DUTs: operar/dut-ssh-access.md
      - Running tests: operar/lab-running-tests.md
      - Virtual mesh tests: operar/virtual-mesh-tests.md
      - Labgrid commands: operar/labgrid-useful-commands.md
      - Adding a DUT: operar/dut-onboarding.md
      - Build firmware: operar/build-firmware-manual.md
      - Wake-on-LAN: operar/wake-on-lan-setup.md
      - ZeroTier remote access: operar/zerotier-remote-access.md
  - Component configuration:
      - Hardware and rack reference:
          - Hardware catalog: configuracion/catalogo-hardware.md
          - "DIY Rack": diseno/diy-rack.md
      - Network and DUTs:
          - Host: configuracion/host-config.md
          - Switch: configuracion/switch-config.md
          - Gateway: configuracion/gateway.md
          - DUTs: configuracion/duts-config.md
      - Services and automation:
          - Arduino relay: configuracion/arduino-relay.md
          - TFTP / dnsmasq: configuracion/tftp-server.md
          - Ansible / Labgrid: configuracion/ansible-labgrid.md
          - CI Runner: configuracion/ci-runner.md
      - Observability:
          - Lab host stack (Prometheus and Grafana): configuracion/observabilidad.md
          - Remote HTTPS access (Oracle VPS): configuracion/grafana-public-access.md
  - Design:
      - Integration overview: diseno/integration-overview.md
      - Lab architecture: diseno/lab-architecture.md
      - openwrt-tests onboarding: diseno/openwrt-tests-onboarding.md
      - openwrt-tests CI flow: diseno/openwrt-tests-ci-flow.md
      - Virtual mesh: diseno/virtual-mesh.md
  - Demos: demos.md
