name: Lint

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ruff (Python)
        uses: astral-sh/ruff-action@v1
        with:
          src: "scripts/"

      - name: Yamllint (YAML)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: configs/
